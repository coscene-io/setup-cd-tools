name: Test
on: [ push ]
jobs:
  run:
    name: Run Test
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ ubuntu-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install
        run: yarn install

      - name: Lint
        run: yarn format-check

      - name: Test
        run: yarn test
